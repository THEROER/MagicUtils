name: ci-dev

on:
  push:
    branches: ["dev"]

permissions:
  contents: read

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v3
      - id: matrix
        run: |
          chmod +x ./gradlew
          echo "targets=$(./gradlew -q printBuildMatrix)" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve-matrix.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x ./gradlew
      - run: ./gradlew buildScenario checkScenario -Ptarget=${{ matrix.target }}
