name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (optional; defaults to gradle.properties)"
        required: false
        default: ""
      skip_validate:
        description: "Skip ./gradlew build validation (emergency only)"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_validate != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build (excluding Fabric loom modules)
        run: |
          chmod +x ./gradlew
          ./gradlew build \
            -x :platform-fabric:build \
            -x :logger-fabric:build \
            -x :placeholders-fabric:build \
            -x :commands-fabric:build \
            -x :fabric-bundle:build

  resolve:
    runs-on: ubuntu-latest
    needs: [validate]
    # Always run, even if validate was skipped
    if: ${{ always() && (needs.validate.result == 'success' || inputs.skip_validate == 'true') }}
    outputs:
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: detect
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(grep -E '^version=' gradle.properties | head -n 1 | cut -d= -f2- | tr -d '[:space:]')"
          fi
          if [ -z "$VERSION" ]; then
            echo "Unable to determine version." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION (tag v$VERSION)"

  tag:
    runs-on: ubuntu-latest
    needs: [resolve]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists on origin." >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  dispatch-downstream:
    runs-on: ubuntu-latest
    needs: [resolve, tag]
    steps:
      - name: Dispatch docs and javadoc workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          # Use workflow_dispatch (not the tag push) to launch docs.yml.
          # This avoids GitHub's GITHUB_TOKEN-pushed-tag rule that suppresses
          # downstream workflow_run events — publish-maven.yml will then see
          # docs as a workflow_dispatch source and trigger correctly.
          gh workflow run docs.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" \
            -f version="$VERSION" \
            -f alias=stable \
            -f set_default=true
          gh workflow run javadoc.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" \
            -f version="$VERSION"
          echo "Dispatched docs.yml and javadoc.yml for $TAG"
