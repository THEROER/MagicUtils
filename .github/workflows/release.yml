name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (optional; defaults to gradle.properties)"
        required: false
        default: ""
      skip_validate:
        description: "Skip ./gradlew build validation (emergency only)"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_validate != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build (non-Fabric platforms)
        run: |
          # Fabric/Loom modules are validated by the matrix ci.yml; here we
          # cover the non-Loom platforms via the scenario aggregate so no
          # module list is hardcoded.
          chmod +x ./gradlew
          ./gradlew buildScenario -PincludePlatforms=bukkit,bungee,velocity,neoforge

  resolve:
    runs-on: ubuntu-latest
    needs: [validate]
    # Always run, even if validate was skipped
    if: ${{ always() && (needs.validate.result == 'success' || inputs.skip_validate == 'true') }}
    outputs:
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: detect
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(grep -E '^version=' gradle.properties | head -n 1 | cut -d= -f2- | tr -d '[:space:]')"
          fi
          if [ -z "$VERSION" ]; then
            echo "Unable to determine version." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION (tag v$VERSION)"

  tag:
    runs-on: ubuntu-latest
    needs: [resolve]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists on origin." >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  dispatch-downstream:
    runs-on: ubuntu-latest
    needs: [resolve, tag]
    steps:
      - name: Dispatch Maven publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          # Documentation lives in the separate MagicUtilsWebsite (Nuxt) project,
          # so the release only dispatches the Maven publish. Use workflow_dispatch
          # (not the tag push) to avoid GitHub's GITHUB_TOKEN-pushed-tag rule that
          # suppresses downstream workflow_run events.
          gh workflow run publish-maven.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" \
            -f version="$VERSION"
          echo "Dispatched publish-maven.yml for $TAG"
      - name: Dispatch Javadoc publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          # Aggregated, themed Javadoc for the common modules is generated and
          # uploaded to Reposilite; the docs site pulls it in at Docker build time.
          gh workflow run publish-javadoc.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" \
            -f version="$VERSION"
          echo "Dispatched publish-javadoc.yml for $TAG"
