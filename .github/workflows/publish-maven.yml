name: publish-maven

on:
  workflow_run:
    workflows: ["docs"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v3

      - name: Publish default target to local gh-pages folder
        run: |
          chmod +x ./gradlew
          ./gradlew clean publish --rerun-tasks -Ppublish_repo=$GITHUB_WORKSPACE/maven -Pskip_shadow_publish=true
          ./gradlew --stop

      - uses: actions/setup-java@v5
        name: Set up Java 17
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Publish mc1201 target to local gh-pages folder
        run: |
          chmod +x ./gradlew
          ./gradlew --rerun-tasks \
            :platform-api:publish \
            :core:publish \
            :config:publish \
            :lang:publish \
            :logger:publish \
            :commands:publish \
            :placeholders:publish \
            :http-client:publish \
            :config-yaml:publish \
            :config-toml:publish \
            :platform-bukkit:publish \
            :bukkit-bundle:publish \
            :platform-fabric:publish \
            :logger-fabric:publish \
            :commands-fabric:publish \
            :placeholders-fabric:publish \
            :fabric-bundle:publish \
            -Ppublish_repo=$GITHUB_WORKSPACE/maven \
            -Pskip_shadow_publish=true \
            -Ptarget=mc1201 \
            -Ppublish_target_suffix=true

      - uses: actions/setup-java@v5
        name: Set up Java 25
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Publish mc2611 Bukkit/common target to local gh-pages folder
        run: |
          chmod +x ./gradlew
          ./gradlew --rerun-tasks \
            :platform-api:publish \
            :core:publish \
            :config:publish \
            :lang:publish \
            :logger:publish \
            :commands:publish \
            :placeholders:publish \
            :http-client:publish \
            :config-yaml:publish \
            :platform-bukkit:publish \
            :bukkit-bundle:publish \
            -Ppublish_repo=$GITHUB_WORKSPACE/maven \
            -Pskip_shadow_publish=true \
            -Ptarget=mc2611 \
            -Ppublish_target_suffix=true

      - name: Generate Maven index
        run: |
          cat > "$GITHUB_WORKSPACE/maven/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>MagicUtils Maven Repository</title>
            <style>
              body { font-family: sans-serif; margin: 2rem; line-height: 1.5; }
              code { background: #f4f4f4; padding: 0.15rem 0.35rem; border-radius: 4px; }
              pre { background: #f4f4f4; padding: 0.75rem; border-radius: 6px; }
            </style>
          </head>
          <body>
            <h1>MagicUtils Maven Repository</h1>
            <p>Use this repository in Gradle:</p>
            <pre>repositories {
              maven { url "https://theroer.github.io/MagicUtils/maven" }
            }</pre>
            <p>Artifacts live under <code>dev/ua/theroer</code>.</p>
          </body>
          </html>
          HTML

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: maven
          destination_dir: maven
          keep_files: true
