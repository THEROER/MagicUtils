name: publish-maven

on:
  workflow_run:
    workflows: ["docs"]
    types: [completed]
  workflow_dispatch:

# Publishing targets the self-hosted Reposilite (maven.theroer.dev) over HTTPS,
# so no repository write access to this GitHub repo is needed anymore.
permissions:
  contents: read

concurrency:
  group: publish-maven
  cancel-in-progress: true

jobs:
  # Single source of truth: every (target -> publish tasks) unit comes from
  # targets.properties via printPublishMatrix. Adding a Minecraft target is a
  # one-line edit to targets.properties — this workflow never lists targets.
  resolve-matrix:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      units: ${{ steps.matrix.outputs.units }}
      repo_url: ${{ steps.coords.outputs.repo_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v3
      - id: matrix
        run: |
          chmod +x ./gradlew
          echo "units=$(./gradlew -q printPublishMatrix)" >> "$GITHUB_OUTPUT"
      - id: coords
        run: |
          REPO_URL=$(grep -E '^repo\.url=' gradle/publishing.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          echo "repo_url=$REPO_URL" >> "$GITHUB_OUTPUT"

  # Each unit publishes its artifacts straight into the Reposilite releases repo.
  # Units run in parallel and write to disjoint artifact paths, so no assembly /
  # single-push step is needed. Credentials come from repo secrets and are read
  # by the build-logic publish helper via PUBLISH_USER / PUBLISH_TOKEN.
  publish:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.resolve-matrix.outputs.units) }}
    env:
      PUBLISH_USER: ${{ secrets.MAVEN_PUBLISH_USER }}
      PUBLISH_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v3
      - name: Publish ${{ matrix.unit.target }}
        run: |
          chmod +x ./gradlew
          ./gradlew clean ${{ matrix.unit.tasks }} --rerun-tasks \
            -Ppublish_repo=${{ needs.resolve-matrix.outputs.repo_url }} \
            -Pskip_shadow_publish=true \
            -Ptarget=${{ matrix.unit.target }} \
            ${{ matrix.unit.suffix && '-Ppublish_target_suffix=true' || '' }}

  # Publish the reusable build-logic plugins (independently versioned) into the
  # same Reposilite repo, so external consumers resolve them alongside the library.
  publish-plugins:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    env:
      PUBLISH_USER: ${{ secrets.MAVEN_PUBLISH_USER }}
      PUBLISH_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v3
      - name: Publish build-logic plugins
        run: |
          chmod +x ./gradlew
          ./gradlew -p build-logic publish \
            -Ppublish_repo=${{ needs.resolve-matrix.outputs.repo_url }}
