name: publish-maven

on:
  workflow_run:
    workflows: ["docs"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Read publishing coordinates
        id: publishing
        run: |
          # Source single-source-of-truth coordinates from gradle/publishing.properties.
          # Anything else in this workflow that references the public repo URL or
          # owner/name pulls from these outputs — never hardcode.
          PROPS=gradle/publishing.properties
          REPO_URL=$(grep -E '^repo\.url=' "$PROPS" | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          REPO_OWNER=$(grep -E '^repo\.owner=' "$PROPS" | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          REPO_NAME=$(grep -E '^repo\.name=' "$PROPS" | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          GROUP=$(grep -E '^group=' "$PROPS" | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          {
            echo "repo_url=$REPO_URL"
            echo "repo_owner=$REPO_OWNER"
            echo "repo_name=$REPO_NAME"
            echo "group=$GROUP"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v3

      - name: Publish default target to local gh-pages folder
        run: |
          chmod +x ./gradlew
          ./gradlew clean publishDefaultMatrix --rerun-tasks \
            -Ppublish_repo=$GITHUB_WORKSPACE/maven \
            -Pskip_shadow_publish=true
          ./gradlew --stop

      - uses: actions/setup-java@v5
        name: Set up Java 21 for mc1201 build JVM
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Publish mc1201 target to local gh-pages folder
        run: |
          chmod +x ./gradlew
          ./gradlew --rerun-tasks \
            publishCommonMatrix publishFabricMatrix \
            -Ppublish_repo=$GITHUB_WORKSPACE/maven \
            -Pskip_shadow_publish=true \
            -Ptarget=mc1201 \
            -Ppublish_target_suffix=true

      - uses: actions/setup-java@v5
        name: Set up Java 25
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Publish mc2611 Bukkit/common target to local gh-pages folder
        run: |
          chmod +x ./gradlew
          ./gradlew --rerun-tasks \
            publishCommonMatrix \
            -Ppublish_repo=$GITHUB_WORKSPACE/maven \
            -Pskip_shadow_publish=true \
            -Ptarget=mc2611 \
            -Ppublish_target_suffix=true

      - name: Stamp last-publish marker
        run: |
          # Encourages GitHub Pages to rebuild promptly after this push,
          # which usually shortens the CDN cache window for newly published
          # Maven artifacts. The file content is informational — see RELEASING.md.
          {
            echo "timestamp: $(date -u +%FT%TZ)"
            echo "commit: ${{ github.sha }}"
            echo "run: ${{ github.run_id }}"
          } > "$GITHUB_WORKSPACE/maven/.last-publish"

      - name: Generate Maven index
        env:
          REPO_URL: ${{ steps.publishing.outputs.repo_url }}
          GROUP: ${{ steps.publishing.outputs.group }}
        run: |
          GROUP_PATH="${GROUP//.//}"
          cat > "$GITHUB_WORKSPACE/maven/index.html" <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>MagicUtils Maven Repository</title>
            <style>
              body { font-family: sans-serif; margin: 2rem; line-height: 1.5; }
              code { background: #f4f4f4; padding: 0.15rem 0.35rem; border-radius: 4px; }
              pre { background: #f4f4f4; padding: 0.75rem; border-radius: 6px; }
            </style>
          </head>
          <body>
            <h1>MagicUtils Maven Repository</h1>
            <p>Use this repository in Gradle:</p>
            <pre>repositories {
              maven { url "${REPO_URL}" }
            }</pre>
            <p>Artifacts live under <code>${GROUP_PATH}</code>.</p>
          </body>
          </html>
          HTML

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: maven
          destination_dir: maven
          keep_files: true
