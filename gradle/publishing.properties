# Publishing coordinates and target repository for MagicUtils.
#
# Single source of truth for everything related to artifact publication:
# - the Maven group used by all modules (build.gradle reads this);
# - the public repository URL where artifacts are hosted (workflow,
#   release script, and generated index page read this);
# - the artifact name used by the post-publish smoke test.
#
# Changing any of these values does not require touching workflows,
# scripts, or per-module build files.

group=dev.ua.theroer

# GitHub Pages serves the user-site URL in lowercase regardless of the
# GitHub username's case. The `repo.owner` value below is the canonical
# case-sensitive owner used by the `gh` CLI and GitHub APIs.
repo.url=https://theroer.github.io/MagicUtils/maven
repo.owner=THEROER
repo.name=MagicUtils

# Artifact polled by scripts/publish_release.py to confirm a release
# landed on the gh-pages CDN. Pick any module that is always part of
# the default-target publish — magicutils-core is the smallest stable
# module that's published unconditionally.
smoke.artifact=magicutils-core
