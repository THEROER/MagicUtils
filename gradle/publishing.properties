# Publishing coordinates and target repository for MagicUtils.
#
# Single source of truth for everything related to artifact publication:
# - the Maven group used by all modules (build.gradle reads this);
# - the public repository URL where artifacts are hosted / read from
#   (release smoke test reads this to poll a published pom);
# - the artifact name used by the post-publish smoke test.
#
# Changing any of these values does not require touching workflows,
# scripts, or per-module build files.

group=dev.ua.theroer

# Public read URL of the self-hosted Reposilite repository. Consumers add this
# as a Gradle maven { url ... }. CI publishes here via `-Ppublish_repo` + the
# PUBLISH_USER / PUBLISH_TOKEN credentials (see .github/workflows/publish-maven.yml).
repo.url=https://maven.theroer.dev/releases

# Artifact polled by the release smoke test to confirm a release landed in the
# repository. Pick any module that is always part of the default-target publish
# — magicutils-core is the smallest stable module that's published unconditionally.
smoke.artifact=magicutils-core
